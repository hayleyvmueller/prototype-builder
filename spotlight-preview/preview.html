<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spotlight Listing Preview · realtor.com</title>
<link rel="icon" href="assets/realtor-logo.svg" type="image/svg+xml" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
<style>
  /* standalone preview — no app shell, full-page scroll */
  html, body, #root { height: auto; min-height: 100%; }
  body { overflow: auto; background: var(--gray-100); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="PreviewPanel.jsx"></script>

  <script type="text/babel">
    /* global React, ReactDOM, PreviewPanel */

    const FALLBACK = {
      street: "400 NW 16th Ave", city: "Austin", state: "TX", zip: "78704",
      price: 865000, beds: 4, baths: 3, sqft: 2240, lotSqft: 6534,
      yearBuilt: 2018, propertyType: "single-family", daysOnSite: 7,
      features: ["Hardwood floors", "Open kitchen", "Backyard", "Modern", "Central AC", "Garage"],
      agentName: "Samantha Reed", brokerage: "Capital City Realty", photos: [],
    };

    let data = FALLBACK;
    try {
      if (window.opener && window.opener.__previewData) {
        // same-browser preview — includes photos
        data = window.opener.__previewData;
      } else {
        // external share link — data encoded in ?d= param
        const d = new URLSearchParams(window.location.search).get("d");
        if (d) data = JSON.parse(decodeURIComponent(atob(d)));
      }
    } catch (_) {}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PreviewPanel data={data} />);
  </script>
</body>
</html>
